name: Hosted Founder Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hosted-founder-smoke:
    if: ${{ secrets.PBK_BRIDGE_API_KEY != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PBK_BRIDGE_API_KEY: ${{ secrets.PBK_BRIDGE_API_KEY }}
      PBK_HOSTED_BRIDGE_URL: ${{ secrets.PBK_HOSTED_BRIDGE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Wait for Render and Netlify
        run: sleep 120

      - name: Run hosted founder smoke
        run: node ./scripts/openclaw-hosted-smoke.mjs
