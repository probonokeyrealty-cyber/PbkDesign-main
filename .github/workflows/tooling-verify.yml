name: Tooling Verify

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tooling-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mcp-server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install MCP server dependencies
        run: npm ci --prefix ./mcp-server

      - name: Run tooling verification
        run: npm run test:tooling
