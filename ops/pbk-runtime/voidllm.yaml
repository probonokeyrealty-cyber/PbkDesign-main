server:
  proxy:
    port: 8080
    read_timeout: 30s
    write_timeout: 120s
    idle_timeout: 60s

database:
  driver: sqlite
  dsn: /data/voidllm.db

models:
  - name: gemini-2.5-flash
    provider: openai
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    api_key: ${GOOGLE_API_KEY}
    aliases: [default]
    timeout: 60s

settings:
  admin_key: ${VOIDLLM_ADMIN_KEY}
  encryption_key: ${VOIDLLM_ENCRYPTION_KEY}
  usage:
    buffer_size: 1000
    flush_interval: 5s
    drop_on_full: true
  token_counting:
    enabled: true
  mcp:
    health:
      enabled: false
    code_mode:
      enabled: false
      schema_ttl: 168h
