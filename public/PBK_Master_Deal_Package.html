@media (max-width: 980px) {

/* ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг
   @page carries the outer margin (matching screen shell
   padding). .packet-page carries only its inner content
   padding. Together they replicate the style guide exactly.
├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг */
@page {

}

@media print {

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ GLOBAL ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ
     Color, base reset, hide all screen chrome.
  ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    forced-color-adjust: none !important;
  }

  html, body {
    margin: 0 !important;
    padding: 0 !important;
    background: #FFFFFF !important;
  }

  #topbar, #sidenav, #content,
  .packet-toolbar, .fill-tracker { display: none !important; }

  .packet-preview-shell {
    padding: 0 !important;
    margin: 0 !important;
    background: #FFFFFF !important;
  }

  .packet-root {
    display: block !important;
    width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ PACKET PAGE ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ
     Each <section class="packet-page"> = one printed
     deliverable. display:block is CRITICAL ├бРѓгРђЮ the screen
     uses display:flex which cannot split across pages
     and creates blank ghost pages in Chrome's PDF engine.
     page-break-before:always starts each deliverable on
     a fresh sheet; first page overrides to auto.
  ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  .packet-page {
    display: block !important;
    width: 100% !important;
    height: auto !important;
    min-height: 0 !important;
    max-height: none !important;
    margin: 0 !important;
    padding: 0.25in 0.35in !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    background: #FFFFFF !important;
    overflow: visible !important;
    box-sizing: border-box !important;
    page-break-before: always;
    break-before: page;
  }

  .packet-page:first-of-type {
    page-break-before: auto;
    break-before: auto;
  }

  /* body no longer in a flex container ├бРѓгРђЮ kill flex:1 */
  .packet-page-body { display: block !important; flex: none !important; }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ TOPBAR ├бРѓгРђЮ tightened for print density ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  .packet-page-topbar {
    display: flex !important;
    padding: 7px 14px !important;
    margin-bottom: 6px !important;
    border-radius: 10px !important;
    background: var(--black) !important;
    overflow: visible !important;
  }
  .packet-page-brand { color: #FFFFFF !important; }
  .packet-page-meta  { color: var(--gray9) !important; }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ BANNER ├бРѓгРђЮ tightened for print density ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  .packet-banner {
    display: flex !important;
    margin-bottom: 6px !important;
    padding: 8px 14px !important;
    border-radius: 10px !important;
    background: var(--black) !important;
    overflow: visible !important;
  }
  .packet-banner-title { font-size: 16px !important; }
  .packet-banner-sub   { font-size: 9px !important; }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ FOOTER ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  .packet-footer {
    display: flex !important;
    margin-top: 10px !important;
    padding-top: 6px !important;
    font-size: 8px !important;
  }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ DEL STRIPE ├бРѓгРђЮ tighten margin-bottom in print ├бРђб┬љ├бРђб┬љ */
  .del-stripe-print { margin-bottom: 6px !important; }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ DOC-GRID ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ
     display:grid cannot split across pages in Chrome.
     Convert to block ├бРѓгРђЮ children stack vertically with
     margin-bottom replacing gap. Tightened for print.
  ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  .doc-grid {
    display: block !important;
  }
  .doc-grid > * {
    margin-bottom: 10px !important;
  }
  .doc-grid > *:last-child {
    margin-bottom: 0 !important;
  }
  .packet-card .doc-grid > * {
    margin-bottom: 8px !important;
  }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ KPI ROW ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ
     display:grid with overflow:hidden ├бРѓгРђЮ both block
     page splitting. Use table layout instead.
  ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  .kpi-row {
    display: table !important;
    width: 100% !important;
    border-collapse: collapse !important;
    overflow: visible !important;
    border-radius: 8px !important;
  }
  .kpi-cell {
    display: table-cell !important;
    border-right: 1px solid var(--border) !important;
    padding: 8px 10px !important;
    vertical-align: top !important;
  }
  .kpi-cell:last-child { border-right: none !important; }
  .packet-card .kpi-cell  { padding: 6px 7px !important; }
  .packet-card .kpi-lbl   { font-size: 8px !important; margin-bottom: 2px !important; }
  .packet-card .kpi-val   { font-size: 12px !important; }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ OPTION GRID ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ
     display:grid ├бРѓгРђЮ convert to table for reliable split.
  ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  .option-grid {
    display: table !important;
    width: 100% !important;
    border-spacing: 8px !important;
    border-collapse: separate !important;
  }
  .option-grid .option-card {
    display: table-cell !important;
    width: 50% !important;
    vertical-align: top !important;
  }
  .packet-card .option-grid   { border-spacing: 6px !important; }
  .packet-card .option-card   { padding: 9px !important; border-radius: 10px !important; }
  .packet-card .option-tag    { margin-bottom: 4px !important; font-size: 7.8px !important; }
  .packet-card .option-price  { margin-bottom: 4px !important; font-size: 16px !important; }
  .packet-card .option-detail,
  .packet-card .option-high,
  .packet-card .check-copy,
  .packet-card .step-desc,
  .packet-card .note-text,
  .packet-card .text-block    { font-size: 8.9px !important; line-height: 1.32 !important; }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ NOTE-BLOCK ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ
     display:flex + overflow:hidden ├бРѓгРђЮ Chrome leaves a gap
     where the block "was" when pushed to next sheet.
     Table layout preserves the accent stripe without clipping.
  ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  .note-block {
    display: table !important;
    width: 100% !important;
    overflow: visible !important;
    border-radius: 8px !important;
    border-collapse: collapse !important;
  }
  .note-accent {
    display: table-cell !important;
    width: 6px !important;
    min-width: 6px !important;
  }
  .note-body {
    display: table-cell !important;
    vertical-align: top !important;
    overflow: visible !important;
  }
  .packet-card .note-body,
  .packet-card .text-card  { padding: 7px 8px !important; }
  .packet-card .note-label { margin-bottom: 2px !important; font-size: 7.8px !important; }
  .packet-card .notes-grid { display: block !important; }
  .packet-card .notes-grid > * { margin-bottom: 6px !important; }
  .packet-card .notes-grid > *:last-child { margin-bottom: 0 !important; }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ CHECK-LIST & STEPS-LIST ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ
     display:grid ├бРѓгРђЮ convert to block.
     Individual items use flex but are single-line so OK.
  ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  .check-list,
  .steps-list {
    display: block !important;
  }
  .check-list li,
  .step-item {
    display: flex !important;
    margin-bottom: 6px !important;
    break-inside: avoid;
    page-break-inside: avoid;
  }
  .check-list li:last-child,
  .step-item:last-child { margin-bottom: 0 !important; }
  .packet-card .check-list li,
  .packet-card .step-item     { padding: 6px 7px !important; border-radius: 10px !important; margin-bottom: 5px !important; }
  .packet-card .step-num      { width: 18px !important; height: 18px !important; font-size: 8px !important; flex-shrink: 0 !important; }
  .packet-card .step-title    { font-size: 9px !important; margin-bottom: 1px !important; }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ TBL-WRAP ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  .tbl-wrap { overflow: visible !important; border-radius: 8px !important; }
  .std-table { break-inside: auto; }
  .packet-card .std-table th    { padding: 5px 6px !important; font-size: 7.6px !important; }
  .packet-card .std-table td,
  .packet-card .info-table td,
  .packet-card .sig-table td    { padding: 5px 6px !important; font-size: 8.9px !important; line-height: 1.28 !important; }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ URGENCY BAR ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  .urgency-bar {
    display: flex !important;
    overflow: visible !important;
    break-inside: avoid;
    page-break-inside: avoid;
  }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ FULL-WIDTH BLOCKS ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  .plain-english-box,
  .motivation-router,
  .net-proceeds-box,
  .all-paths-comparison,
  .objection-matrix {
    overflow: visible !important;
    border-radius: 8px !important;
    break-inside: avoid;
    page-break-inside: avoid;
  }
  .motivation-router table { width: 100% !important; }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ INFO-COLS TABLE ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  .info-cols-table    { width: 100% !important; table-layout: fixed !important; }
  .info-cols-table td { vertical-align: top !important; padding-right: 5px !important; }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ PACKET CARD ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  .packet-card {
    border: 1px solid var(--border) !important;
    border-radius: 12px !important;
    padding: 12px 12px 10px !important;
    background: #FFFFFF !important;
    break-inside: avoid;
    page-break-inside: avoid;
    margin-bottom: 12px !important;
  }
  .packet-card:last-child { margin-bottom: 0 !important; }
  .packet-card-head  { margin-bottom: 8px !important; padding-bottom: 7px !important; }
  .packet-card-title { font-size: 14px !important; }
  .packet-card-sub   { font-size: 9.5px !important; }
  .packet-card .sec-hdr { margin-bottom: 5px !important; font-size: 8px !important; letter-spacing: 0.1em !important; }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ TOPBAR / BANNER BREAK CONTROL ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  .packet-page-topbar,
  .packet-banner,
  .kpi-row,
  .tbl-wrap,
  .note-block     { break-inside: avoid; page-break-inside: avoid; }

  /* ├бРђб┬љ├бРђб┬љ├бРђб┬љ HEADINGS ├бРѓгРђЮ keep with next sibling ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ
     Only h-tags, NOT .sec-hdr ├бРѓгРђЮ sec-hdr causes orphan
     heading gaps at page bottoms when break-after:avoid
     is set and the following block can't fit.
  ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ├бРђб┬љ */
  h1, h2, h3, .packet-card-head {
    break-after: avoid;
    page-break-after: avoid;
  }

  p, li, td { orphans: 2; widows: 2; }

} /* end @media print */


/* ├бРђЮРѓг├бРђЮРѓг Packet page body ├бРѓгРђЮ content area ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг */
.packet-page-body {
  flex: 1;
}

/* ├бРђЮРѓг├бРђЮРѓг Packet page topbar ├бРѓгРђЮ branded header bar ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг */
.packet-page-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 9px 14px;
  margin-bottom: 12px;
  background: var(--black);
  border-bottom: 2px solid var(--blue);
  border-radius: 10px;
  flex-shrink: 0;
}

.packet-page-brand {
  display: flex;
  align-items: center;
  gap: 0;
  color: #FFFFFF;
}

.packet-page-meta {
  text-align: right;
  color: var(--gray9);
  font-size: 10px;
  line-height: 1.5;
}

/* ├бРђЮРѓг├бРђЮРѓг Packet footer ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг */
.packet-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-top: 14px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  color: var(--mid);
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  flex-shrink: 0;
}

/* ├бРђЮРѓг├бРђЮРѓг END UPGRADES ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг */
</style>
</head>
<body>
<div id="app"></div>
<script>
function escapeHtml(value) {
  var str = String(value == null ? "" : value);
  // Auto-fill [BRACKET] tokens from deal data before HTML-escaping
  if (window._pbkFill) str = window._pbkFill(str);
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}


// ├бРђЮРѓг├бРђЮРѓг PBK Deal Data Reader ├бРѓгРђЮ fills [BRACKET] tokens from URL params ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг
(function() {
  function p(key, fallback) {
    try {
      var v = new URLSearchParams(window.location.search).get(key);
      return (v !== null && v !== '') ? decodeURIComponent(v) : (fallback || '');
    } catch(e) { return fallback || ''; }
  }
  function fmt(n) {
    var num = parseFloat(n);
    return (!isNaN(num) && num > 0) ? '$' + Math.round(num).toLocaleString() : '';
  }

  // Read all deal fields from URL params
  window._pbk = {
    sellerName:   p('sellerName',  '[SELLER NAME]'),
    sellerEmail:  p('sellerEmail', '[EMAIL]'),
    sellerPhone:  p('sellerPhone', '[PHONE]'),
    address:      p('address',     '[PROPERTY ADDRESS]'),
    date:         p('date',        new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})),
    closeTimeline: p('closeTimeline', ''),
    earnestBase:  p('earnestBase', ''),
    arv:          fmt(p('arv'))    || '[ARV]',
    cashPrice:    fmt(p('maoCash'))|| '[CASH PRICE]',
    rbpPrice:     fmt(p('maoRbp')) || '[RBP PRICE]',
    rbpGain:      (parseFloat(p('maoRbp')) > 0 && parseFloat(p('maoCash')) > 0) ? fmt(parseFloat(p('maoRbp')) - parseFloat(p('maoCash'))) : '[RBP GAIN]',
    agreedPrice:  fmt(p('agreedPrice')) || '[AGREED PRICE]',
    repairs:      fmt(p('repairs')) || '[REPAIRS]',
    rent:         fmt(p('rent'))    || '[RENT]',
    cfDn:         fmt(p('cfDn'))    || '[CF DOWN PAYMENT]',
    cfRate:       p('cfRate') ? p('cfRate') + '%' : '[CF RATE]',
    cfTerm:       p('cfTerm') ? p('cfTerm') + ' years' : '[CF TERM]',
    cfType:       p('cfType', ''),
    mtUpfront:    fmt(p('mtUpfront')) || '[MT UPFRONT]',
    mtBal:        fmt(p('mtBal'))   || '[LOAN BALANCE]',
    mtRate:       p('mtRate') ? p('mtRate') + '%' : '[EXISTING RATE]',
    mtType:       p('mtType', ''),
    cashAlternative: fmt(p('cashAlternative')) || p('cashAlternative', ''),
    lotSize:      p('lotSizeConfirmed', p('lotSize', '')),
    offerToSeller: fmt(p('offerToSeller')) || p('offerToSeller', ''),
    builderPays:  fmt(p('builderPays')) || p('builderPays', ''),
    interestRate: p('interestRate', ''),
    loanTerm:     p('loanTerm', ''),
    balloonTerm:  p('balloonTerm', ''),
    loanTreatment: p('loanTreatment', ''),
    existingLoanBalance: fmt(p('existingLoanBalance')) || fmt(p('mtBal')) || p('existingLoanBalance', ''),
    existingRate: p('existingRate', ''),
    compAAddr:    p('compAAddr',   '[Comp A] - nearby area, similar specs'),
    compAPrice:   fmt(p('compAPrice')) || '[PRICE A]',
    compADate:    p('compADate',   '[DATE A]'),
    compBAddr:    p('compBAddr',   '[Comp B] - nearby area, comparable'),
    compBPrice:   fmt(p('compBPrice')) || '[PRICE B]',
    compBDate:    p('compBDate',   '[DATE B]'),
    compCAddr:    p('compCAddr',   '[Comp C] - nearby area, recent sale'),
    compCPrice:   fmt(p('compCPrice')) || '[PRICE C]',
    compCDate:    p('compCDate',   '[DATE C]'),
    // Derived safe/stretch/ceiling for cash path
    safeCash:     (parseFloat(p('maoCash')) > 0) ? fmt(Math.round(parseFloat(p('maoCash')) * 0.93)) : '[SAFE CASH PRICE]',
    stretchCash:  fmt(p('maoCash')) || '[STRETCH CASH PRICE]',
    ceilCash:     (parseFloat(p('maoCash')) > 0) ? fmt(Math.round(parseFloat(p('maoCash')) * 1.05)) : '[CEILING CASH PRICE]',
    rbpListingPrice: fmt(p('rbpListingPrice')) || '[RBP LISTING PRICE]',
    safeRbp:      fmt(p('safeRbpPrice')) || '[SAFE RBP PRICE]',
    stretchRbp:   fmt(p('stretchRbpPrice')) || '[STRETCH RBP PRICE]',
    ceilRbp:      fmt(p('ceilingRbpPrice')) || '[CEILING RBP PRICE]',
    netTraditional: (parseFloat(p('arv')) > 0) ? fmt(Math.round(parseFloat(p('arv')) * 0.91)) : '[NET TRADITIONAL]',
    netPbkPath:   fmt(p('agreedPrice')) || '[NET PBK PATH]',
    netAdvantage: (parseFloat(p('arv')) > 0 && parseFloat(p('agreedPrice')) > 0)
                    ? fmt(Math.abs(Math.round(parseFloat(p('arv')) * 0.91) - parseFloat(p('agreedPrice'))))
                    : '[NET ADVANTAGE]',
    netToPbk:     fmt(p('netToPbk')) || '[NET TO PBK]',
    marketPriceEst: fmt(p('marketPriceEst')) || '[MARKET PRICE EST.]',
    equity:       fmt(p('equity')) || '[EQUITY]',
    equityCapture: fmt(p('equityCapture')) || '[EQUITY CAPTURE]',
    monthlyPayment: fmt(p('monthlyPayment')) || p('monthlyPayment', ''),
    monthlySpread: fmt(p('monthlySpread')) || '[MONTHLY SPREAD]',
    entryCost:    fmt(p('entryCost')) || '[ENTRY COST]',
    carryingCosts: fmt(p('carryingCosts')) || '[CARRYING COSTS]',
    holdingCosts: fmt(p('holdingCosts')) || '[HOLDING COSTS]',
    repairView:   p('repairView', '[REPAIR VIEW]'),
    condition:    p('condition', '[CONDITION]'),
    conditionNotes: p('conditionNotes', '[CONDITION NOTES]'),
    score:        p('score', '[SCORE]'),
    level:        p('level', '[LEVEL]'),
    analystName:  p('analystName', '[ANALYST NAME]'),
    equityPosition: p('equityPosition', '[EQUITY POSITION]'),
    domHistory:   p('domHistory', '[DOM / HISTORY]'),
    assessment:   p('assessment', '[ASSESSMENT]'),
    titleRisk:    p('titleRisk', '[LOW/MED/HIGH]'),
    paymentTolerance: p('paymentTolerance', '[PAYMENT TOLERANCE]'),
    exitPlan:     p('exitPlan', '[EXIT PLAN]'),
    reinstatementNeed: p('reinstatementNeed', '[REINSTATEMENT NEED]'),
    arrearsAmount: fmt(p('arrearsAmount')) || p('arrearsAmount', ''),
    ifAny:        p('ifAny', ''),
    allocatedCosts: p('allocatedCosts', ''),
    commEst:      fmt(p('commissionEst')) || '',
    closingEst:   fmt(p('closingCostsEst')) || '',
  };

  // Global token replacement used by renderBlock text content
  window._pbkFill = function(str) {
    if (!str || str.indexOf('[') === -1) return str;
    var t = window._pbk;
    function maybeAppend(str, suffix) {
      var s = String(str || '');
      if (!s) return '';
      if (s.indexOf(suffix) !== -1) return s;
      if (/^\d+(\.\d+)?$/.test(s.trim())) return s + suffix;
      return s;
    }
    str = str
      // Identity
      .replace(/\[SELLER NAME\]/g,         t.sellerName   || '[SELLER NAME]')
      .replace(/\[PROPERTY ADDRESS\]/g,    t.address      || '[PROPERTY ADDRESS]')
      .replace(/\[DATE\]/g,                t.date         || '[DATE]')
      .replace(/\[EMAIL\]/g,               t.sellerEmail  || '[EMAIL]')
      .replace(/\[PHONE\]/g,               t.sellerPhone  || '[PHONE]')
      .replace(/\[CLOSE TIMELINE\]/g,      t.closeTimeline || '[CLOSE TIMELINE]')
      .replace(/\[EARNEST DEPOSIT\]/g,     t.earnestBase || '[EARNEST DEPOSIT]')
      .replace(/\[DEPOSIT AMOUNT\]/g,      t.earnestBase || '[DEPOSIT AMOUNT]')
      .replace(/\[CASH ALTERNATIVE\]/g,    t.cashAlternative || '[CASH ALTERNATIVE]')
      .replace(/\[LOT SIZE\]/g,            t.lotSize || '[LOT SIZE]')
      .replace(/\[OFFER TO SELLER\]/g,     t.offerToSeller || '[OFFER TO SELLER]')
      .replace(/\[BUILDER PAYS\]/g,        t.builderPays || '[BUILDER PAYS]')
      // Prices ├бРѓгРђЮ cash path
      .replace(/\[CASH PRICE\]/g,          t.cashPrice    || '[CASH PRICE]')
      .replace(/\[AGREED CASH PRICE\]/g,   t.cashPrice    || '[AGREED CASH PRICE]')
      .replace(/\[SAFE CASH PRICE\]/g,     t.safeCash     || '[SAFE CASH PRICE]')
      .replace(/\[STRETCH CASH PRICE\]/g,  t.stretchCash  || '[STRETCH CASH PRICE]')
      .replace(/\[CEILING CASH PRICE\]/g,  t.ceilCash     || '[CEILING CASH PRICE]')
      .replace(/\[MAO CASH\]/g,            t.cashPrice    || '[MAO CASH]')
      // Prices ├бРѓгРђЮ RBP path
      .replace(/\[RBP PRICE\]/g,           t.rbpPrice     || '[RBP PRICE]')
      .replace(/\[RBP GAIN\]/g,            t.rbpGain      || '[RBP GAIN]')
      .replace(/\[RBP LISTING PRICE\]/g,   t.rbpListingPrice || t.rbpPrice || '[RBP LISTING PRICE]')
      .replace(/\[RBP_LISTING_PRICE\]/g,   t.rbpListingPrice || t.rbpPrice || '[RBP_LISTING_PRICE]')
      .replace(/\[SAFE RBP PRICE\]/g,      t.safeRbp     || t.rbpPrice || '[SAFE RBP PRICE]')
      .replace(/\[STRETCH RBP PRICE\]/g,   t.stretchRbp  || t.rbpPrice || '[STRETCH RBP PRICE]')
      .replace(/\[CEILING RBP PRICE\]/g,   t.ceilRbp     || t.rbpPrice || '[CEILING RBP PRICE]')
      .replace(/\[MAO RBP\]/g,             t.rbpPrice     || '[MAO RBP]')
      // Prices ├бРѓгРђЮ CF path
      .replace(/\[CF PRICE\]/g,            t.agreedPrice  || '[CF PRICE]')
      .replace(/\[CREATIVE PRICE\]/g,      t.agreedPrice  || '[CREATIVE PRICE]')
      .replace(/\[SAFE CREATIVE PRICE\]/g, t.agreedPrice  || '[SAFE CREATIVE PRICE]')
      .replace(/\[STRETCH CREATIVE PRICE\]/g, t.agreedPrice || '[STRETCH CREATIVE PRICE]')
      .replace(/\[CEILING CREATIVE PRICE\]/g, t.agreedPrice || '[CEILING CREATIVE PRICE]')
      .replace(/\[CF DOWN PAYMENT\]/g,     t.cfDn         || '[CF DOWN PAYMENT]')
      .replace(/\[DOWN PAYMENT\]/g,        t.cfDn         || '[DOWN PAYMENT]')
      .replace(/\[CF RATE\]/g,             maybeAppend(t.cfRate, '%') || '[CF RATE]')
      .replace(/\[CF TERM\]/g,             maybeAppend(t.cfTerm, ' years') || '[CF TERM]')
      .replace(/\[BALLOON YEAR\]/g,        t.cfTerm       || '[BALLOON YEAR]')
      .replace(/\[INTEREST RATE\]/g,       maybeAppend(t.interestRate || t.cfRate, '%') || '[INTEREST RATE]')
      .replace(/\[LOAN TERM\]/g,           maybeAppend(t.loanTerm || t.balloonTerm || t.cfTerm, ' years') || '[LOAN TERM]')
      .replace(/\[TERM LENGTH\]/g,         maybeAppend(t.loanTerm || t.balloonTerm || t.cfTerm, ' years') || '[TERM LENGTH]')
      .replace(/\[BALLOON DATE OR NONE\]/g, (function() {
        var b = t.balloonTerm || '';
        if (!b || b === '0') return 'No balloon';
        return maybeAppend(b, ' years from closing');
      })())
      .replace(/\[REMAIN IN PLACE \/ NEW WRAP \/ NONE\]/g, t.loanTreatment || 'None')
      // Prices ├бРѓгРђЮ MT path
      .replace(/\[MT PRICE\]/g,            t.agreedPrice  || '[MT PRICE]')
      .replace(/\[SAFE MT PRICE\]/g,       t.agreedPrice  || '[SAFE MT PRICE]')
      .replace(/\[STRETCH MT PRICE\]/g,    t.agreedPrice  || '[STRETCH MT PRICE]')
      .replace(/\[CEILING MT PRICE\]/g,    t.agreedPrice  || '[CEILING MT PRICE]')
      .replace(/\[MT UPFRONT\]/g,          t.mtUpfront    || '[MT UPFRONT]')
      .replace(/\[EXISTING LOAN BALANCE\]/g, t.existingLoanBalance || t.mtBal || '[LOAN BALANCE]')
      .replace(/\[LOAN BALANCE\]/g,        t.existingLoanBalance || t.mtBal || '[LOAN BALANCE]')
      .replace(/\[EXISTING RATE\]/g,       maybeAppend(t.existingRate || t.mtRate, '%') || '[EXISTING RATE]')
      // Agreed / general price
      .replace(/\[AGREED PRICE\]/g,        t.agreedPrice  || '[AGREED PRICE]')
      .replace(/\[PATH PRICE\]/g,          t.agreedPrice  || '[PATH PRICE]')
      .replace(/\[PRICE\]/g,               t.agreedPrice  || '[PRICE]')
      // Property fundamentals

      .replace(/\[NET ADVANTAGE\]/g,       t.netAdvantage    || '[NET ADVANTAGE]')
      .replace(/\[NET TO PBK\]/g,          t.netToPbk       || t.netAdvantage || '[NET TO PBK]')
      .replace(/\[DIFFERENCE\]/g,          t.netAdvantage    || '[DIFFERENCE]')
      .replace(/\[COMMISSION EST\.\]/g,    t.commEst         || (t.arv ? '$' + Math.round(parseFloat(t.arv.replace(/[$,]/g,'')) * 0.06).toLocaleString() : '[COMMISSION EST.]'))

      .replace(/\[REPAIR VIEW\]/g,         t.repairView || t.repairs || '[REPAIR VIEW]')
      .replace(/\[CARRYING COSTS\]/g,      t.carryingCosts || '[CARRYING COSTS]')
      .replace(/\[HOLDING COSTS\]/g,       t.holdingCosts || '[HOLDING COSTS]')
      .replace(/\[ENTRY COST\]/g,          t.entryCost || t.cfDn || t.mtUpfront || '[ENTRY COST]')
      .replace(/\[EQUITY CAPTURE\]/g,      t.equityCapture || t.equity || '[EQUITY CAPTURE]')
      .replace(/\[EQUITY POSITION\]/g,     t.equityPosition || '[EQUITY POSITION]')
      .replace(/\[EQUITY\]/g,              t.equity || '[EQUITY]')
      .replace(/\[MONTHLY PAYMENT\]/g,     t.monthlyPayment || '[MONTHLY PAYMENT]')
      .replace(/\[MONTHLY SPREAD\]/g,      t.monthlySpread || '[MONTHLY SPREAD]')
      .replace(/\[MONTHLY BURDEN \/ ARREARS \/ RELIEF\]/g, '[MONTHLY BURDEN / ARREARS / RELIEF]')
      .replace(/\[ANALYST NAME\]/g,        t.analystName || '[ANALYST NAME]')
      .replace(/\[CONDITION\]/g,           t.condition || '[CONDITION]')
      .replace(/\[CONDITION NOTES\]/g,     t.conditionNotes || '[CONDITION NOTES]')
      .replace(/\[SCORE\]/g,               t.score || '[SCORE]')
      .replace(/\[LEVEL\]/g,               t.level || '[LEVEL]')
      .replace(/\[DOM \/ HISTORY\]/g,      t.domHistory || '[DOM / HISTORY]')
      .replace(/\[ASSESSMENT\]/g,          t.assessment || '[ASSESSMENT]')
      .replace(/\[LOW\/MED\/HIGH\]/g,      t.titleRisk || '[LOW/MED/HIGH]')
      .replace(/\[TITLE RISK\]/g,          t.titleRisk || '[TITLE RISK]')
      .replace(/\[PAYMENT TOLERANCE\]/g,   t.paymentTolerance || '[PAYMENT TOLERANCE]')
      .replace(/\[EXIT PLAN\]/g,           t.exitPlan || '[EXIT PLAN]')
      .replace(/\[REINSTATEMENT NEED\]/g,  t.reinstatementNeed || '[REINSTATEMENT NEED]')
      .replace(/\[ARREARS AMOUNT\]/g,      t.arrearsAmount || '[ARREARS AMOUNT]')
      .replace(/\[ARREARS\]/g,             t.arrearsAmount || '[ARREARS]')
      .replace(/\[IF ANY\]/g,              t.ifAny || '[IF ANY]')
      .replace(/\[ALLOCATED COSTS\]/g,     t.allocatedCosts || '[ALLOCATED COSTS]');
    return str;
  };
})();

function isValidPath(pathKey) {
  return Object.prototype.hasOwnProperty.call(packageData, pathKey);
}

function isExportablePath(pathKey) {
  return ["cash", "cash-realtor-house", "cash-realtor-land", "cf", "mt", "rbp"].indexOf(pathKey) !== -1;
}

function firstSectionForPath(pathKey) {
  return pathMap[pathKey] ? pathMap[pathKey].first : "cash-a";
}

function sectionIdFor(pathKey, deliverableKey) {
  return pathKey === "int" ? "int-page" : pathKey + "-" + deliverableKey;
}

function resolvePathFromSection(sectionId) {
  if (sectionId === "int-page") return "int";
  const allKeys = Object.keys(pathMap);
  allKeys.sort(function(a, b) { return b.length - a.length; });
  for (var i = 0; i < allKeys.length; i++) {
    if (String(sectionId || "").indexOf(allKeys[i]) === 0) {

  var arr = trigger.querySelector('.objection-arr');
  var body = trigger.nextElementSibling;
  var isOpen = body.classList.contains('open');
  trigger.closest('.objection-matrix').querySelectorAll('.objection-body').forEach(function(b) { b.classList.remove('open'); });
  trigger.closest('.objection-matrix').querySelectorAll('.objection-arr').forEach(function(a) { a.classList.remove('open'); });

}

  if (block.type === "options") return renderOptionsBlock(block);
  if (block.type === "checklist") return renderChecklistBlock(block);
  if (block.type === "steps") return renderStepsBlock(block);
  if (block.type === "notes") return renderNotesBlock(block);
  if (block.type === "text") return renderTextBlock(block);
  if (block.type === "signature") return renderSignatureBlock(block);
  if (block.type === "urgencyBar") return renderUrgencyBar(block.expiryDays);

function buildModeUrl(mode, pathKey) {
  const url = new URL(window.location.href);
  url.searchParams.delete("pbk_preview");
  url.searchParams.delete("pbk_print");
  url.searchParams.delete("section");
  if (mode === "preview") {
    url.searchParams.set("pbk_preview", "1");
  }
  if (mode === "print") {
    url.searchParams.set("pbk_print", "1");
  }
  url.searchParams.set("path", pathKey);
  return url.toString();
}

function syncAppUrl() {
  const url = new URL(window.location.href);
  url.searchParams.delete("pbk_preview");
  url.searchParams.delete("pbk_print");
  url.searchParams.set("path", activePath);
  url.searchParams.set("section", activeSection);
  history.replaceState(null, "", url.toString());
}

    return deliverable.blocks;
  }
  if (deliverableKey === "b") {
    return deliverable.blocks.slice(0, 2);
  }
  if (deliverableKey === "c") {
    return [deliverable.blocks[0], deliverable.blocks[1], deliverable.blocks[deliverable.blocks.length - 1]].filter(Boolean);
  }
  if (deliverableKey === "d") {
    return [deliverable.blocks[0], deliverable.blocks[2], deliverable.blocks[deliverable.blocks.length - 1]].filter(Boolean);
  }
  if (deliverableKey === "e") {
    return deliverable.blocks.slice(0, 2);
  }
  return deliverable.blocks;
}

function renderPacketCard(deliverableKey, deliverable, spanTwo) {
  const packetBlocks = getPacketBlocks(deliverableKey, deliverable);
  return [
    "<article class=\"packet-card" + (spanTwo ? " span-2" : "") + "\">",
    "<div class=\"packet-card-head\">",
    "<div class=\"packet-del-band\"><span class=\"del-code\">" + escapeHtml(deliverable.code) + "</span><span class=\"del-title\">" + escapeHtml(deliverable.bandTitle) + "</span></div>",
    "<h2 class=\"packet-card-title\">" + escapeHtml(deliverable.title) + "</h2>",
    "<p class=\"packet-card-sub\">" + escapeHtml(deliverable.subtitle) + "</p>",
    "</div>",
    renderBlocks(packetBlocks),
    "</article>"
  ].join("");
}

function renderPacketPage(pathKey, pageNumber, innerHtml, showBanner) {
  const pathData = packageData[pathKey];
  return [
    "<section class=\"packet-page\">",
    "<div class=\"packet-page-topbar\">",
    "<div class=\"packet-page-brand\">PBK Master Deal Package</div>",
    "<div class=\"packet-page-meta\">Selected path: " + escapeHtml(pathData.label) + "<br>Page " + escapeHtml(pageNumber) + " of 2</div>",
    "</div>",
    showBanner ? "<div class=\"packet-banner\"><div class=\"packet-banner-title\">" + escapeHtml(pathData.bannerTitle) + "</div><div class=\"packet-banner-sub\">" + escapeHtml(pathData.bannerSub) + "</div></div>" : "",
    innerHtml,
    "<div class=\"packet-footer\">Selected path only | Preview and PDF stay aligned | PBK premium packet</div>",
    "</section>"
  ].join("");
}

/* Deliverable letter ├бРђаРђЎ identity stripe colors */
var DEL_STRIPE = {
  a: { accent: "#2A97DA", bg: "#E8F4FB", name: "Seller Presentation Guide" },
  b: { accent: "#111827", bg: "#F1F2F3", name: "Letter of Intent" },
  c: { accent: "#D97706", bg: "#FEF3C7", name: "Internal Deal Report" },
  d: { accent: "#1A6FA3", bg: "#DBEEFB", name: "Deal Intelligence Report" },
  e: { accent: "#16A34A", bg: "#DCFCE7", name: "Next Steps Flow" }
};

/* Render the branded header that appears at the top of every packet page */
function renderPacketPageHeader(pathData, deliverable, pageNum, totalPages) {
  return [
    '<div class="packet-page-topbar">',
    '<div class="packet-page-brand">',
    '<span style="color:#2A97DA;font-weight:700;font-size:13px;letter-spacing:-.02em">PBK</span>',
    '&nbsp;<span style="font-size:11px;font-weight:600;color:#FFFFFF">PROBONO KEY REALTY</span>',
    '</div>',
    '<div class="packet-page-meta">',
    escapeHtml(pathData.label) + '&nbsp;&bull;&nbsp;' + escapeHtml(deliverable.code),
    '<br>Page ' + escapeHtml(String(pageNum)) + ' of ' + escapeHtml(String(totalPages)),
    '</div>',
    '</div>'
  ].join('');
}

/* Render the colored deliverable identity stripe */
function renderDelStripe(key, deliverable) {
  var s = DEL_STRIPE[key] || DEL_STRIPE.a;
  return [
    '<div class="del-stripe-print" style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:8px 12px;',
    'border-radius:8px;background:', s.bg, ';border-left:4px solid ', s.accent, ';">',
    '<div style="width:26px;height:26px;border-radius:5px;background:', s.accent,
    ';color:#fff;display:flex;align-items:center;justify-content:center;',
    'font-size:13px;font-weight:700;flex-shrink:0;">', escapeHtml(key.toUpperCase()), '</div>',
    '<div>',
    '<div style="font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;',
    'color:', s.accent, ';margin-bottom:1px;">', escapeHtml(deliverable.code), '</div>',
    '<div style="font-size:12px;font-weight:700;color:#1F2937;">', escapeHtml(deliverable.title), '</div>',
    '</div>',
    '</div>'
  ].join('');
}

/* All blocks for every deliverable ├бРѓгРђЮ no truncation */
function getPacketBlocks(deliverableKey, deliverable) {
  /* Strip objectionMatrix from seller-facing (A) ├бРѓгРђЮ internal use only */
  if (deliverableKey === 'a') {
    return deliverable.blocks.filter(function(b) {
      return b.type !== 'objectionMatrix';
    });
  }
  return deliverable.blocks;
}

const packetMarkupCache = Object.create(null);

function buildPacketMarkup(pathKey) {
  if (packetMarkupCache[pathKey]) return packetMarkupCache[pathKey];

  var pathData = packageData[pathKey];
  var deliverables = pathData.deliverables;
  var keys = Object.keys(deliverables);   /* ['a','b','c','d','e'] */
  var total = keys.length;

  var pages = keys.map(function(key, idx) {
    var del = deliverables[key];
    var blocks = getPacketBlocks(key, del);
    var isFirst = idx === 0;

    return [
      '<section class="packet-page">',

      /* Topbar ├бРѓгРђЮ on every page */
      renderPacketPageHeader(pathData, del, idx + 1, total),

      /* Path banner ├бРѓгРђЮ first page only */
      isFirst
        ? '<div class="packet-banner"><div class="packet-banner-title">'
          + escapeHtml(pathData.bannerTitle)
          + '</div><div class="packet-banner-sub">'
          + escapeHtml(pathData.bannerSub)
          + '</div></div>'
        : '',

      /* Deliverable identity stripe */
      renderDelStripe(key, del),

      /* ├бРђЮРѓг├бРђЮРѓг Full content ├бРђЮРѓг├бРђЮРѓг */
      '<div class="packet-page-body">',
      '<div class="doc-grid">',
      blocks.map(renderBlock).join(''),
      '</div>',
      '</div>',

      /* Footer */
      '<div class="packet-footer">',
      '<span>Probono Key Realty &bull; info@probonokeyrealty.com &bull; (949) 204-0072</span>',
      '<span style="color:#2A97DA;font-weight:700;">'
        + escapeHtml(pathData.label.toUpperCase()) + ' PATH &bull; CONFIDENTIAL</span>',
      '</div>',

      '</section>'
    ].join('');
  });

  packetMarkupCache[pathKey] = pages.join('');
  return packetMarkupCache[pathKey];
}

let packetPrintQueued = false;

function auditPacketRender() {
  /* Pages have natural height in preview ├бРѓгРђЮ content flows to
     as many physical sheets as needed when printed.
     This audit just collects metrics; it does not clamp or hide content. */
  return Array.prototype.slice.call(document.querySelectorAll(".packet-page"))
    .map(function(page, index) {
      var h = page.scrollHeight;
      page.dataset.pageIndex = String(index + 1);
      page.dataset.naturalHeight = String(h) + "px";
      /* Remove any legacy clamping class */
      page.classList.remove("packet-page-overflow");
      return { page: index + 1, naturalHeight: h };
    });
}

function queuePacketPrint() {
  if (packetPrintQueued) {
    return;
  }
  packetPrintQueued = true;

  const flushPrint = function() {
    packetPrintQueued = false;
    window.requestAnimationFrame(function() {
      auditPacketRender();
      window.print();
    });
  };

  const settleAndPrint = function() {
    window.requestAnimationFrame(function() {
      window.requestAnimationFrame(flushPrint);
    });
  };

  if (document.fonts && document.fonts.ready) {
    Promise.race([
      document.fonts.ready.catch(function() {}),
      new Promise(function(resolve) { window.setTimeout(resolve, 240); })
    ]).then(settleAndPrint);
    return;
  }

  settleAndPrint();
}

function openStyledPreview() {
  if (!isExportablePath(activePath)) {
    return;
  }
  const url = buildModeUrl("preview", activePath);
  const popup = window.open(url, "_blank", "noopener");
  if (!popup) {
    window.location.href = url;
  }
}

function generateSelectedPathPdf() {
  if (!isExportablePath(activePath)) {
    return;
  }
  const url = buildModeUrl("print", activePath);
  const popup = window.open(url, "_blank", "noopener");
  if (!popup) {
    window.location.href = url;
  }
}

function renderPreviewMode(pathKey, autoPrint) {
  document.title = autoPrint
    ? "PBK_" + pathKey.toUpperCase() + "_Deal_Package"
    : "PBK_" + pathKey.toUpperCase() + "_Deal_Package_Preview";

  const returnUrl = new URL(window.location.href);
  returnUrl.searchParams.delete("pbk_preview");
  returnUrl.searchParams.delete("pbk_print");
  returnUrl.searchParams.set("path", pathKey);
  returnUrl.searchParams.set("section", firstSectionForPath(pathKey));

  const app = document.getElementById("app");
  const packetMarkup = buildPacketMarkup(pathKey);

  app.innerHTML = [
    "<div class=\"packet-preview-shell\">",
    "<div class=\"packet-toolbar\">",
    "<div class=\"packet-toolbar-copy\">",
    "<h1 class=\"packet-toolbar-title\">" + escapeHtml(packageData[pathKey].label) + " premium packet</h1>",
    "<p class=\"packet-toolbar-sub\">5 pages &mdash; one per deliverable (A through E). Full content per page. Overflow carries cleanly to the next printed sheet. Click Print / Save PDF for the final document.</p>",
    "</div>",
    "<div class=\"packet-toolbar-actions\">",
    "<button class=\"packet-btn\" data-preview-action=\"back\">Return to App</button>",
    "<button class=\"packet-btn primary\" data-preview-action=\"print\">Print / Save PDF</button>",
    "</div>",
    "</div>",
    "<div class=\"packet-root\">",
    packetMarkup,
    "</div>",
    "</div>"
  ].join("");

  const backButton = app.querySelector("[data-preview-action=\"back\"]");
  const printButton = app.querySelector("[data-preview-action=\"print\"]");

  if (backButton) {
    backButton.addEventListener("click", function() {
      window.location.href = returnUrl.toString();
    });
  }

  if (printButton) {
    printButton.addEventListener("click", function() {
      queuePacketPrint();
    });
  }

  auditPacketRender();

  if (autoPrint) {
    queuePacketPrint();
  }
}

function boot() {
  const params = new URLSearchParams(window.location.search);
  const requestedPath = params.get("path");
  const requestedSection = params.get("section");
  const previewMode = params.get("pbk_preview") === "1";
  const printMode = params.get("pbk_print") === "1";

  if (previewMode || printMode) {
    const packetPath = isExportablePath(requestedPath) ? requestedPath : "cash";
    activePath = packetPath;
    activeSection = firstSectionForPath(packetPath);
    renderPreviewMode(packetPath, printMode);
    return;
  }

  if (requestedSection && delSections.indexOf(requestedSection) !== -1) {
    activeSection = requestedSection;
    activePath = resolvePathFromSection(requestedSection);
  } else if (isValidPath(requestedPath)) {
    activePath = requestedPath;
    activeSection = firstSectionForPath(activePath);
  } else {
    activePath = "cash";
    activeSection = "cash-a";
  }

  if (requestedPath && isValidPath(requestedPath) && resolvePathFromSection(activeSection) !== requestedPath) {
    activePath = requestedPath;
    activeSection = firstSectionForPath(requestedPath);
  }

  renderApp();
}

boot();
</script>
